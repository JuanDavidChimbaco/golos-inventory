name: golos-production

services:
  # 1. Base de datos (Dockerizada)
  db:
    image: postgres:16-alpine
    container_name: golos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-inventario_db}
      POSTGRES_USER: ${DB_USER:-inventario_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - golos_network

  # 2. Redis para WebSockets
  redis:
    image: redis:7-alpine
    container_name: golos-redis
    restart: unless-stopped
    networks:
      - golos_network

  # 3. Aplicación Django
  app:
    image: toothiertrain13/golos-app:latest
    container_name: golos-app
    restart: unless-stopped
    env_file:
      - .env
    working_dir: /app/config
    ports:
      - "8000:8000"
    networks:
      - golos_network
    depends_on:
      - db
      - redis
    command:
      - daphne
      - -b
      - 0.0.0.0
      - -p
      - "8000"
      - --proxy-headers
      - config.asgi:application

volumes:
  postgres_data:

networks:
  golos_network:
    driver: bridge
